{% extends "adminmaster.html" %}
{% load static %}
{% block m1 %}

<style>

.profile-container{
    display:flex;
    justify-content:center;
    margin-top:50px;
}

.profile-card{
    width:500px;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.15);
    text-align:center;
}

.profile-icon{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#f1f1f1;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
}

.profile-title{
    margin-top:15px;
    font-size:30px;
    font-weight:bold;
}

.info-box{
    text-align:left;
    margin-top:25px;
}

.info-row{
    padding:12px;
    border-bottom:1px solid #ddd;
    font-size:18px;
}

.label{
    font-weight:bold;
}

.btn-box{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.btn{
    border:none;
    padding:12px 25px;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.edit-btn{
    background:#007bff;
}

.delete-btn{
    background:#dc3545;
}

</style>

<div class="profile-container">

{% if obj %}
{% for k in obj %}

<div class="profile-card">

    <div class="profile-icon">
        👨‍💼
    </div>

    <div class="profile-title">
        Admin Profile
    </div>

    <div class="info-box">

        <div class="info-row">
            <span class="label">Name :</span>
            {{ k.name }}
        </div>

        <div class="info-row">
            <span class="label">Email :</span>
            {{ k.email }}
        </div>

        <div class="info-row">
            <span class="label">Phone Number :</span>
            {{ k.phone }}
        </div>

    </div>

    <div class="btn-box">

        <form method="post" action="/edit_admin_profile/">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ k.email }}">
            <input type="submit" value="Edit Profile" class="btn edit-btn">
        </form>

        <form method="post" action="/delete_admin_profile/">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ k.email }}">
            <input type="submit" value="Delete Profile" class="btn delete-btn">
        </form>

    </div>

</div>

{% endfor %}
{% endif %}

</div>

{% endblock %}
