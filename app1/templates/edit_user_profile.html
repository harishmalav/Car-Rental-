{% extends "usermaster.html" %}
{% load static %}

{% block m3 %}

<style>

.edit-card{
    width:550px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.15);
}

.edit-card h1{
    text-align:center;
    color:#333;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#444;
}

.form-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.btn-update{
    width:100%;
    background:#007bff;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.btn-update:hover{
    background:#0056b3;
}

</style>

{% if key1 %}
{% for k in key1 %}

<div class="edit-card">

    <h1>Edit Profile</h1>

    <form method="post" action="../save_edit_user_profile/">

        {% csrf_token %}

        <div class="form-group">
            <label>User ID</label>
            <input type="text" name="id" value="{{ k.userid }}" readonly>
        </div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="T1" value="{{ k.name }}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="T2" value="{{ k.email }}">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="T3" value="{{ k.phone }}">
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="T4" value="{{ k.address }}">
        </div>

        <input type="submit" value="Update Profile" class="btn-update">

    </form>

</div>

{% endfor %}
{% endif %}

{% endblock %}
