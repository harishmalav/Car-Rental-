{% extends "usermaster.html" %}
{% load static %}

{% block m3 %}

<style>

.booking-card{
    width:700px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.15);
}

.booking-card h1{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.form-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.row{
    display:flex;
    gap:15px;
}

.row .form-group{
    flex:1;
}

.summary{
    background:#f8f9fa;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.btn-book{
    width:100%;
    background:#28a745;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

</style>

<div class="booking-card">

<h1>Book Your Car</h1>

<div class="summary">
    <b>Total Amount:</b> ₹{{ total }}
</div>

<form method="post" enctype="multipart/form-data" action="../save_booking/">

{% csrf_token %}

<input type="hidden" name="userid" value="{{ userid }}">
<input type="hidden" name="total" value="{{ total }}">
<input type="hidden" name="carid" value="{{ carid }}">
<input type="hidden" name="Car_Name" value="{{ Car_Name }}">
<input type="hidden" name="Car_Number" value="{{ Car_Number }}">

<div class="form-group">
<label>Full Name</label>
<input type="text" name="Full_Name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="Email" required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="number" name="Mobile_Number" required>
</div>

<div class="form-group">
<label>Address</label>
<input type="text" name="Address" required>
</div>

<div class="form-group">
<label>Driver License Number</label>
<input type="text" name="driver_license" required>
</div>

<div class="form-group">
<label>Driver License Photo</label>
<input type="file" name="f" required>
</div>

<div class="row">

<div class="form-group">
<label>Pickup Date</label>
<input type="date" name="g" required>
</div>

<div class="form-group">
<label>Pickup Time</label>
<input type="time" name="h" required>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Return Date</label>
<input type="date" name="i" required>
</div>

<div class="form-group">
<label>Return Time</label>
<input type="time" name="j" required>
</div>

</div>

<div class="form-group">
<label>Pickup Location</label>
<input type="text" name="k" required>
</div>

<div class="form-group">
<label>Drop Location</label>
<input type="text" name="l" required>
</div>

<input type="submit" value="Confirm Booking" class="btn-book">

</form>

</div>

{% endblock %}
