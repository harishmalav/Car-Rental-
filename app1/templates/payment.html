{% extends "usermaster.html" %}
{% load static %}

{% block m3 %}

<style>

.payment-card{
    width:500px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.15);
}

.payment-card h1{
    text-align:center;
    margin-bottom:20px;
}

.summary{
    background:#f8f9fa;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:18px;
}

.payment-option{
    margin:12px 0;
    font-size:18px;
}

.pay-btn{
    width:100%;
    background:#28a745;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

.pay-btn:hover{
    background:#1e7e34;
}

</style>

<div class="payment-card">

    <h1>Payment</h1>

    <div class="summary">
        <b>Car Name :</b> {{ Car_Name }} <br><br>
        <b>Total Amount :</b> ₹{{ total }}
    </div>

    <form method="post" action="/pay/">

        {% csrf_token %}

        <input type="hidden" name="bookingid" value="{{ bookingid }}">
        <input type="hidden" name="amount" value="{{ total }}">

        <h3>Select Payment Method</h3>

        <div class="payment-option">
            <input type="radio" name="payment" value="Cash" required>
            Cash
        </div>

        <div class="payment-option">
            <input type="radio" name="payment" value="Paytm">
            Paytm
        </div>

        <div class="payment-option">
            <input type="radio" name="payment" value="PhonePe">
            PhonePe
        </div>

        <div class="payment-option">
            <input type="radio" name="payment" value="Card">
            Debit / Credit Card
        </div>

        <input type="submit" value="Pay Now" class="pay-btn">

    </form>

</div>

{% endblock %}
