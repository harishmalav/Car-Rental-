{% extends "usermaster.html" %}
{% load static %}

{% block m3 %}

<style>

.password-card{
    width:500px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.15);
}

.password-card h1{
    text-align:center;
    color:#333;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#444;
}

.form-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.btn-save{
    width:100%;
    background:#28a745;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.btn-save:hover{
    background:#1e7e34;
}

</style>

{% if key1 %}
{% for h in key1 %}

<div class="password-card">

    <h1>Change Password</h1>

    <form method="post" action="../save_edit_user_password/">

        {% csrf_token %}

        <div class="form-group">
            <label>Email</label>
            <input type="text" name="email" value="{{ h.email }}" readonly>
        </div>

        <div class="form-group">
            <label>Old Password</label>
            <input type="password" name="T1" required>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="T2" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="T3" required>
        </div>

        <input type="submit" value="Save Password" class="btn-save">

    </form>

</div>

{% endfor %}
{% endif %}

{% endblock %}
