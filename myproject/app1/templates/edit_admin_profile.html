{% extends "adminmaster.html" %}
{% load static %}
{% block m1 %}

<style>

.edit-container{
    display:flex;
    justify-content:center;
    margin-top:50px;
}

.edit-card{
    width:500px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.15);
}

.edit-title{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    font-weight:bold;
    margin-bottom:8px;
    font-size:18px;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

.save-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#28a745;
    color:white;
    font-size:18px;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

.save-btn:hover{
    background:#218838;
}

</style>

<div class="edit-container">

{% if obj %}
{% for b in obj %}

<div class="edit-card">

    <div class="edit-title">
        Edit Admin Profile
    </div>

    <form method="post" action="../save_edit_admin_profile/">

        {% csrf_token %}

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ b.name }}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="text" name="email" value="{{ b.email }}" readonly>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" value="{{ b.phone }}">
        </div>

        <input type="submit" value="Save Changes" class="save-btn">

    </form>

</div>

{% endfor %}
{% endif %}

</div>

{% endblock %}
